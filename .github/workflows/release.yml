name: Release Image
on:
    release:
        types: [published]
jobs:
    Release_Image:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
        
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{github.actor}}
                password: ${{secrets.GITHUB_TOKEN }}

            - name: Build and Push Versioned Image
              uses: docker/build-push-action@v6
              with:
                push: true
                tags: |
                 ghcr.io/${{github.repository_owner}}/portfolio-devops-project:${{github.event.release.tag_name}}
                 ghcr.io/${{github.repository_owner}}/portfolio-devops-project:latest
