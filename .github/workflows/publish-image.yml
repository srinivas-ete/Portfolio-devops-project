name: Publish Docker Image
on:
    push:
        branches:
            - main
jobs:
    Publish_Image:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
        
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{github.actor}}
                password: ${{secrets.GITHUB_TOKEN }}

            - name: Build Image
              run: |
               docker build -t ghcr.io/${{github.repository_owner}}/portfolio-devops-project:latest .

            - name: Push Image
              run: |
               docker push ghcr.io/${{github.repository_owner}}/portfolio-devops-project:latest
